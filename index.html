<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEONCODE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo" onclick="show('home')">
  <img src="./logo.png" alt="Logo">
NEONCODE
</div>
    <!-- IMPORTANT IDs -->
    <button class="btn" onclick="show('login')" id="loginBtn">Login</button>
    <button class="btn" onclick="logout()" id="logoutBtn">Logout</button>
  </div>
</header>

<!-- ================= LOGIN ================= -->
<div id="login" class="page">
  <div class="login-box">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">

    <button class="btn" onclick="login()">Login</button>

    <p>No account? 
      <span onclick="show('signup')" style="cursor:pointer;color:#22d3ee;">Signup</span>
    </p>

    <p id="loginError" style="color:red;"></p>
  </div>
</div>

<!-- ================= SIGNUP ================= -->
<div id="signup" class="page">
  <div class="login-box">
    <h2>Create Account</h2>

    <input type="text" id="signupName" placeholder="Full Name">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPass" placeholder="Password">

    <button class="btn" onclick="signup()">Signup</button>

    <p>Already have an account? 
      <span onclick="show('login')" style="cursor:pointer;color:#22d3ee;">Login</span>
    </p>

    <p id="signupError" style="color:red;"></p>
  </div>
</div>

<!-- ================= HOME ================= -->
<div id="home" class="page">
  <h1>Welcome to Codenova</h1>
  <p id="welcomeUser"></p>

  <div class="home-grid">

    <div class="home-card" onclick="show('compiler')">
      <h2>⚡ Compiler</h2>
      <button class="btn">Open</button>
    </div>

    <div class="home-card" onclick="show('assistant')">
      <h2>🤖 Error AI</h2>
      <button class="btn">Open</button>
    </div>

    <div class="home-card" onclick="show('scriptwriter')">
      <h2>📝 Script Writer</h2>
      <button class="btn">Open</button>
    </div>

    <div class="home-card" onclick="show('admin')">
      <h2>👑 Admin</h2>
      <button class="btn">Open</button>
    </div>
    <div class="home-card">
       <h2>FOLOW ON INSTAGRAM FOR MORE UPDATES</h2>
    </div>
  </div>
</div>

<!-- ================= COMPILER ================= -->
<div id="compiler" class="page">
  <h1>🚀 JavaScript Compiler</h1>

  <textarea id="code" rows="10" placeholder="Write your code..."></textarea>

  <br><br>
  <button class="btn" onclick="runMultiLang()">▶ Run</button>
  <button class="btn" onclick="saveCode()">💾 Save</button>
  <button class="btn" onclick="loadCode()">📂 Load</button>
  <button class="btn" onclick="downloadCode()">⬇ Download Code</button>
  <div id="output" style="margin-top:20px;"></div>

  <button class="btn" onclick="show('home')">Back</button>
</div>

<!-- ================= AI ================= -->
<div id="assistant" class="page">
  <h1>Error Assistant</h1>

  <textarea id="userInput" rows="5" placeholder="Paste error..."></textarea>
  <button class="btn" onclick="askAI()">Ask</button>

  <div id="assistantOutput" style="margin-top:20px;"></div>

  <button class="btn" onclick="show('home')">Back</button>
</div>

<!-- ================= SCRIPT ================= -->
<div id="scriptwriter" class="page">
  <h1>Script Writer</h1>

  <textarea id="scriptInput" rows="5" placeholder="Write idea..."></textarea>
  <button class="btn" onclick="writeScript()">Generate</button>

  <div id="scriptOutput" style="margin-top:20px;"></div>

  <button class="btn" onclick="show('home')">Back</button>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="page">
  <h1>👑 Admin Panel</h1>

  <button class="btn" onclick="loadUsers()">Load Users</button>
  <button class="btn" onclick="showStats()">Show Stats</button>

  <!-- IMPORTANT -->
  <div id="userList" style="margin-top:20px;"></div>

  <button class="btn" onclick="show('home')">Back</button>
</div>

<!-- JS LINK -->
<script src="script.js"></script>

</body>
</html>
